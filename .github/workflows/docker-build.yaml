name: Docker Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            raw_tag="${{ github.event.release.tag_name }}"
          else
            raw_tag="manual-${GITHUB_SHA::7}"
          fi

          safe_tag="$(printf '%s' "$raw_tag" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+//; s/-+$//')"
          if [ -z "$safe_tag" ]; then
            safe_tag="sha-${GITHUB_SHA::7}"
          fi

          echo "tag=$safe_tag" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${{ env.IMAGE_NAME }}:$safe_tag"
            if [ "${{ github.event_name }}" = "release" ]; then
              echo "${{ env.IMAGE_NAME }}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.vars.outputs.tags }}

      - name: Prepare release notes
        if: github.event_name == 'workflow_dispatch'
        run: |
          {
            echo "## Docker Images"
            echo ""
            echo "- \`${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}\`"
            echo ""
            echo "## Architectures"
            echo ""
            echo "- linux/amd64"
            echo "- linux/arm64"
            echo ""
            if [ -n "${{ steps.build.outputs.digest }}" ]; then
              echo "## Manifest Digest"
              echo ""
              echo "- \`${{ steps.build.outputs.digest }}\`"
              echo ""
            fi
            echo "## Verify"
            echo ""
            echo "\`\`\`bash"
            echo "docker buildx imagetools inspect ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}"
            echo "\`\`\`"
          } > release-notes.md

      - name: Create release for manual run
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.tag }}
          target_commitish: ${{ github.sha }}
          body_path: release-notes.md
          append_body: true
          generate_release_notes: true
